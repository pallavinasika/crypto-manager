version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  api:
    build: .
    command: python main.py api
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - ENVIRONMENT=production
    depends_on:
      - mongodb
    restart: always

  dashboard:
    build: .
    command: python main.py dashboard
    ports:
      - "8501:8501"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - API_HOST=api
      - API_PORT=8001
    depends_on:
      - api
    restart: always

  web:
    build:
      context: ./web
      args:
        - VITE_API_BASE=http://localhost:8001
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

volumes:
  mongodb_data:
